  title_pl: O mnie
  description: |
    Frontend Developer with 8 years of experience specializing in Nuxt.js. I provide comprehensive web development services, focusing on modern, fast, and scalable solutions.
    Expert in e-commerce using Medusa.js and Node.js, as well as building robust backends with Supabase. I turn complex requirements into elegant, high-performance digital products.
  description_pl: |
    Frontend Developer z 8-letnim doświadczeniem specjalizujący się w Nuxt.js. Świadczę kompleksowe usługi w zakresie tworzenia nowoczesnych, szybkich i skalowalnych rozwiązań internetowych.
    Ekspert w e-commerce przy użyciu Medusa.js i Node.js, a także w budowaniu solidnych backendów za pomocą Supabase. Przekształcam złożone wymagania w eleganckie, wydajne produkty cyfrowe.
