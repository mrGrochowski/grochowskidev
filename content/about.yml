title: About Me
description: Learn more about my journey as a Frontend Developer with 8 years of experience, specializing in Nuxt, Medusa.js, and Supabase.
content: |
  Hi, I'm **Mateusz Grochowski**, a Frontend Developer with over 8 years of experience in the industry. My passion lies in creating high-performance, scalable web applications and intuitive user interfaces.

  I specialize in the **Nuxt** ecosystem, delivering complete, production-ready websites. My expertise extends to building complex e-commerce solutions using **Node.js** and **Medusa.js**, as well as leveraging **Supabase** for efficient backend management and real-time data handling.

  ### My Approach

  I believe that the best web solutions are a perfect blend of performance, maintainability, and user experience. My 8-year journey has taught me how to bridge the gap between complex business requirements and elegant technical implementations.

  Whether it's a small landing page or a large-scale e-commerce platform, I focus on writing clean, efficient code and utilizing the latest technologies to ensure long-term project success.

  ### Core Technologies

  - **Nuxt & Vue.js**: For building modern, SEO-friendly frontends.
  - **Node.js & Medusa.js**: For powerful, customizable e-commerce backends.
  - **Supabase**: For database, authentication, and real-time features.

  ### Beyond the Screen

  When I'm not coding, I'm constantly exploring new technologies and contributing to the developer community. I'm passionate about building tools that make people's lives easier and digital experiences better.

  Thanks for visiting my portfolio. Feel free to check out my [projects](/projects) or [get in touch](/#contact) if you'd like to collaborate!
